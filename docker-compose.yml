version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: finanzas-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--noauth"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }); }"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      MONGO_INITDB_DATABASE: finanzas
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro

  redis:
    image: redis:7-alpine
    container_name: finanzas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
